<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soal 2 - Dynamic Boxes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">Responsive Header</div>
    </header>

    <main class="content">
      <section class="control-panel">
        <h1>Buat Kotak Square</h1>
        <p>Masukkan jumlah kotak yang ingin dibuat, lalu klik tombol.</p>
        <div class="input-row">
          <label for="boxCount">Jumlah kotak</label>
          <input id="boxCount" type="number" min="1" max="20" value="6" />
          <button id="generateBtn">Buat Kotak</button>
        </div>
      </section>

      <section class="box-area" id="boxArea" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">Responsive Footer</div>
    </footer>

    <script>
      const boxArea = document.getElementById("boxArea");
      const boxCountInput = document.getElementById("boxCount");
      const generateBtn = document.getElementById("generateBtn");

      function createBoxes(count) {
        boxArea.innerHTML = "";
        const boxCount = Number(count);

        if (!boxCount || boxCount < 1) {
          boxArea.innerHTML = '<p class="empty-message">Masukkan angka minimal 1.</p>';
          return;
        }

        for (let i = 1; i <= boxCount; i += 1) {
          const box = document.createElement("div");
          box.className = "box-card";
          box.textContent = `Box ${i}`;
          boxArea.appendChild(box);
        }
      }

      generateBtn.addEventListener("click", () => {
        createBoxes(boxCountInput.value);
      });

      window.addEventListener("load", () => {
        createBoxes(boxCountInput.value);
      });
    </script>
  </body>
</html>
